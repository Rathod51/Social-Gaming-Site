<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>


    <aside class="sidebar">

        <h2 class="logo">🎮 GameHub</h2>

        <button class="nav-btn" onclick="location.href='home.html'">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </button>

        <button class="nav-btn" onclick="location.href='notification.html'">
            <i class="fa-solid fa-bell"></i>
            <span>Notifications</span>
        </button>

        <button class="nav-btn" onclick="location.href='game-setup.html'">
            <i class="fa-solid fa-gamepad"></i>
            <span>Play Games</span>
        </button>

        <button class="nav-btn" onclick="location.href='profile.html'">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </button>

        <button class="nav-btn" onclick="location.href='setting.html'">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </button>

    </aside>


<!--................... MAIN AREA ...........................-->


    <div class="main-area">

        <!-- .................TOPBAR ..............-->

        <header class="topbar">

            <input class="search" type="text" placeholder="Search players, games...">

            <div class="top-actions">
                <button class="icon-btn" onclick="location.href='chat.html'">
                    <i class="fa-regular fa-pen-to-square"></i>
                </button>
            </div>

        </header>


        <!--..............REELS AREA ..............-->

        <div class="reels-container">


        <!-- REEL 1 -->

        <div class="reel-card">

            <video class="reel-video" controls><source src="reel1.mp4" type="video/mp4"></video>

            <div class="reel-actions">
                <button><i class="fa-regular fa-heart"></i></button>
                <button><i class="fa-regular fa-comment"></i></button>
                <button><i class="fa-solid fa-share"></i></button>
                <button><i class="fa-solid fa-circle-info"></i></button>
            </div>

            <div class="reel-info">
                <h4>@SportsDaily</h4>
                <p>Top football goals of the season ⚽</p>
            </div>

        </div>

        <!-- REEL 2 -->

        <div class="reel-card">

            <video class="reel-video" controls><source src="reel2.mp4" type="video/mp4"></video>

            <div class="reel-actions">
                <button><i class="fa-regular fa-heart"></i></button>
                <button><i class="fa-regular fa-comment"></i></button>
                <button><i class="fa-solid fa-share"></i></button>
                <button><i class="fa-solid fa-circle-info"></i></button>
            </div>

            <div class="reel-info">
                <h4>@ChessMaster</h4>
                <p>Best chess opening strategy ♟️</p>
            </div>

        </div>

        <!-- REEL 3 -->

        <div class="reel-card">

            <video class="reel-video" controls><source src="reel3.mp4" type="video/mp4"></video>

            <div class="reel-actions">
                <button><i class="fa-regular fa-heart"></i></button>
                <button><i class="fa-regular fa-comment"></i></button>
                <button><i class="fa-solid fa-share"></i></button>
                <button><i class="fa-solid fa-circle-info"></i></button>
            </div>

            <div class="reel-info">
                <h4>@GamingArena</h4>
                <p>Epic gaming moments 🎮</p>
            </div>

        </div>


        </div>

    </div>
    <script src="app.js" defer></script>
    
</body>
</html>
