<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="story.css">
    <link rel="stylesheet" href="posts.css">
    <link rel="stylesheet" href="notifi.css">


</head>
<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

  <div class="top-left">
    <h2 class="top-logo">🎮 GameHub</h2>
  </div>

  <button class="nav-btn" data-link="home.html">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </button>

  <button class="nav-btn notif-btn">
    <i class="fa-solid fa-bell"></i>
    <span>Notifications</span>
  </button>

  <button class="nav-btn" data-link="game-setup.html">
    <i class="fa-solid fa-gamepad"></i>
    <span>Play</span>
  </button>

  <button class="nav-btn" data-link="invite.html">
    <i class="fa-solid fa-user-plus"></i>
    <span>Invite</span>
  </button>

  <button class="nav-btn" data-link="upload.html">
    <i class="fa-solid fa-plus"></i>
    <span>Upload</span>
  </button>

  <button class="nav-btn" data-link="profile.html">
    <i class="fa-solid fa-user"></i>
    <span>Profile</span>
  </button>

  <button class="nav-btn" data-link="settings.html">
    <i class="fa-solid fa-gear"></i>
    <span>Settings</span>
  </button>

</aside>


<!-- ================= MAIN ================= -->
<div class="main-content">

  <div class="profile-container">

    <!-- HEADER -->
    
    <div class="profile-header">

  <!-- LEFT: PROFILE IMAGE -->
      <div class="profile-left">
        <img src="https://i.pravatar.cc/150" class="profile-img-large">
      </div>

  <!-- RIGHT: USER INFO -->
      <div class="profile-right">

    <!-- TOP ROW -->
        
          <h2 class="name"></h2>
          <p class="username"></p>
          <p class="bio"></p>
        
    <!-- STATS -->
     <div class="profile-stats">
        <span><b class="post-count">0</b> Posts</span>
        <span><b>120</b> Followers</span>
        <span><b>80</b> Following</span>
      </div> 

    <!-- BUTTONS -->
      <div class="profile-buttons">
        <button id="editProfileBtn">Edit profile</button>
        <button>Settings</button>
      </div>

      </div>
    </div>


    <!-- HIGHLIGHTS -->
    <div class="highlights"></div>


    <!-- ================= MENU + SEARCH ================= -->
    <div class="profile-filter">

      <input type="text" id="searchInput" placeholder="Search posts...">

      <div class="menu-wrapper">
        <button id="menuBtn">☰</button>

        <div id="menuDropdown" class="menu-dropdown">
          <div class="menu-item" data-target="posts">Posts</div>
          <div class="menu-item" data-target="saved">Saved Posts</div>
          <div class="menu-item" data-target="achievements">Achievements</div>
        </div>
      </div>

    </div>


    <!-- ================= CONTENT ================= -->

    <!-- POSTS -->
    <div class="content-section active" id="posts">
      <div class="posts-grid"></div>
    </div>

    <!-- SAVED -->
    <div class="content-section" id="saved">
      <p>No saved posts yet</p>
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="content-section" id="achievements">
      <div class="badges">
        <div class="badge">Rank #12</div>
        <div class="badge">⭐ 2450 Points</div>
        <div class="badge">🏆</div>
        <div class="badge">🎯</div>
        <div class="badge">🔥</div>
      </div>
    </div>

  </div>

</div>


<!-- NOTIFICATIONS -->
<div id="notifOverlay" class="notif-overlay"></div>

<div id="notifPanel" class="notif-panel">
  <iframe src="notifi.html"></iframe>
</div>

<script src="profile.js" defer></script>
<script src="story.js"></script>
<script src="posts.js"></script>
<script src="app.js"></script>
    
</body>
</html>
