<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="profile1.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile-container">

<!-- 🔷 HEADER -->
  <div class="profile-header">
    <div class="top-row">

<!-- RANK -->
      <div class="rank">
        <h2>Rank</h2>
        <h3>#12</h3>
      </div>

<!-- CENTER -->
      <div class="profile-center">
        <div class="avatar-wrapper">
          <img src="https://i.pravatar.cc/100" class="profile-img">
          <span class="online-dot"></span>
        </div>

        <h2 class="name">Twinkel Rathod</h2>
        <p class="username">@twinkel</p>
        <p class="bio">🎮 Passionate gamer | ♟️ Chess lover</p>
        <p class="followers">120 Followers • 80 Following</p>

        <!-- ACTION BUTTONS -->
        <div class="actions">
          <button class="primary">Edit Profile</button>
          <button class="secondary">Settings</button>
        </div>

      </div>

      <!-- POINTS -->
      <div class="points">
        <h2>Total Poinst</h2>
        <h3>2450</h3>
      </div>

    </div>


  </div>


<!--- HIGHLIGHTS -->

    <div class="highlights"> </div>


<!--  ACHIEVEMENTS -->
  <div class="section">
    <h3>Achievements</h3>
    <div class="badges">
      <div class="badge">🏆</div>
      <div class="badge">🎯</div>
      <div class="badge">🔥</div>
    </div>
  </div>


 <!--  REWARDS -->
  <div class="section">
    <h3>Rewards</h3>
    <div class="rewards">
      <div class="reward-card">Winning: 1200</div>
      <div class="reward-card">Moves: 800</div>
      <div class="reward-card">Bonus: 450</div>
    </div>
  </div>


<!--  MATCH STATS -->
  <div class="section">
    <h3>Match Stats</h3>

    <p>Total Matches: 50</p>
    <p>Wins: 30 | Losses: 20</p>

    <div class="progress-bar">
      <div class="progress" style="width:60%"></div>
    </div>
    <p>Win Rate: 60%</p>
  </div>


</div>

<script src="profile.js" defer></script>
<script src="profile1.js" defer></script>

    
</body>
</html>
