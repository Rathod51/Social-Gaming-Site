<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px 20px;
            text-align: center;
            position: relative;
        }

        .rank-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffd700;
            color: #333;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .rank-number {
            font-size: 24px;
            line-height: 1;
        }

        .rank-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid white;
            margin: 0 auto 20px;
            background: #f0f0f0;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .username {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .profile-content {
            padding: 40px 20px;
            text-align: center;
        }

        .points-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            border-radius: 15px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .points-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .points-value {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: countUp 1.5s ease-out;
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .button-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-edit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-share {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-share:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .profile-container {
                max-width: 100%;
            }

            .points-value {
                font-size: 36px;
            }

            .username {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Header Section -->
        <div class="profile-header">
            <div class="rank-badge">
                <div class="rank-number" id="rankNumber">1</div>
                <div class="rank-label">Rank</div>
            </div>
            <img src="https://via.placeholder.com/140?text=Profile" alt="Profile Picture" class="profile-pic" id="profilePic">
            <h1 class="username" id="username">ProGamer92</h1>
        </div>

        <!-- Content Section -->
        <div class="profile-content">
            <!-- Points Section -->
            <div class="points-section">
                <div class="points-label">Total Points</div>
                <div class="points-value" id="totalPoints">0</div>
            </div>

            <!-- Stats -->
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-label">Games Played</div>
                    <div class="stat-value" id="gamesPlayed">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Win Rate</div>
                    <div class="stat-value" id="winRate">0%</div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-container">
                <button class="btn-edit" onclick="editProfile()">Edit Profile</button>
                <button class="btn-share" onclick="shareProfile()">Share</button>
            </div>
        </div>
    </div>

    <script>
        // Sample user data
        const userData = {
            rank: 1,
            username: "ProGamer92",
            profilePic: "https://via.placeholder.com/140?text=Profile",
            totalPoints: 15750,
            gamesPlayed: 128,
            wins: 96,
            losses: 32
        };

        // Initialize profile on page load
        function initProfile() {
            // Set rank
            document.getElementById('rankNumber').textContent = userData.rank;

            // Set username
            document.getElementById('username').textContent = userData.username;

            // Set profile picture
            document.getElementById('profilePic').src = userData.profilePic;

            // Animate points counter
            animatePoints(userData.totalPoints);

            // Set games played
            document.getElementById('gamesPlayed').textContent = userData.gamesPlayed;

            // Calculate and set win rate
            const winRate = Math.round((userData.wins / userData.gamesPlayed) * 100);
            document.getElementById('winRate').textContent = winRate + '%';
        }

        // Animate points counting
        function animatePoints(finalPoints) {
            const pointsElement = document.getElementById('totalPoints');
            const duration = 1500; // milliseconds
            const startTime = Date.now();
            const startPoints = 0;

            function updatePoints() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const currentPoints = Math.floor(startPoints + (finalPoints - startPoints) * progress);
                pointsElement.textContent = currentPoints.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(updatePoints);
                }
            }

            updatePoints();
        }

        // Edit profile function
        function editProfile() {
            alert(`Editing profile for ${userData.username}`);
            // Add your edit profile logic here
        }

        // Share profile function
        function shareProfile() {
            const shareText = `Check out my profile! I'm rank ${userData.rank} with ${userData.totalPoints.toLocaleString()} points!`;
            if (navigator.share) {
                navigator.share({
                    title: 'Game Profile',
                    text: shareText,
                    url: window.location.href
                });
            } else {
                alert(shareText);
            }
        }

        // Initialize when page loads
        window.addEventListener('load', initProfile);
    </script>
</body>
</html>
