<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Social Gaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="notifi.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    
<!-- SIDEBAR -->

<aside class="sidebar">

    <div class="top-left">
        <h2 class="top-logo">🎮 GameHub</h2>
    </div>

    <button class="nav-btn" data-link="home.html">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </button>


    <button class="nav-btn  notif-btn"s>
        <i class="fa-solid fa-bell"></i>
        <span>Notifications</span>
    </button>

    <button class="nav-btn" data-link="game-setup.html">
        <i class="fa-solid fa-gamepad"></i>
        <span>Play</span>
    </button>

    <button class="nav-btn" data-link="invite.html">
        <i class="fa-solid fa-user-plus"></i>
        <span>Invite</span>
    </button>
    
    <button class="nav-btn" data-link="upload.html">
        <i class="fa-solid fa-plus"></i>
        <span>Upload</span>
    </button>

    <button class="nav-btn" data-link="profile.html">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
    </button>

    <button class="nav-btn" data-link="setting.html">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
    </button>

    <div class="sidebar-footer">
        <div class="game-status">
            <div class="online-dot"></div>
            <span>Online: 128 players</span>
        </div>
    </div>

</aside>


<!-- MAIN AREA -->

<div class="main-area">

<!-- TOPBAR -->

    <header class="topbar">

        <div class="topbar-inner">

            <input class="search" type="text" placeholder="Search players, games...">

            <div class="top-actions">
                <button class="icon-btn top-players-btn" id="topPlayersBtn"> <i class="fa-solid fa-trophy"></i></button>
                <button class="icon-btn" id="chatPageBtn" data-link="chat.html"><i class="fa-regular fa-pen-to-square"></i>
                <span class="badge" id="chatBadge">0</span>
                </button>
            </div>
        </div>
    </header>


    
<!-- FEED -->
    <div class="home-wrapper">
        <main class=" main-feed feed">
            <!-- posts will be rendered here -->
        </main> 
        <aside class="right-sidebar">
            <!-- suggestions / ads / top players later -->
        </aside>
    </div> 

</div>



!-- Overlay -->
        <div id="notifOverlay" class="notif-overlay"></div>

<!-- Panel -->
        <div id="notifPanel" class="notif-panel">
            <iframe src="notifi.html"></iframe>
        </div>


<script src="auth.js"></script>
<script src="app.js"></script>
<script src="home.js" defer></script>
<script src="home1.js" defer></script>
<script src="notifi.js"></script>

</body>
</html>
