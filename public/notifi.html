<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    
<!-- SIDEBAR -->

<aside class="sidebar">

    <h2 class="logo">🎮 GameHub</h2>

    <button class="nav-btn" onclick="location.href='home.html'">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </button>

    <button class="nav-btn" onclick="location.href='notifi.html'">
        <i class="fa-solid fa-bell"></i>
        <span>Notifications</span>
    </button>

    <button class="nav-btn" id="playGameBtn" onclick="location.href='game-setup.html'">
        <i class="fa-solid fa-gamepad"></i>
        <span>Play Games</span>
    </button>

    <button class="nav-btn" id="inviteBtn">
        <i class="fa-solid fa-user-plus"></i>
        <span>Invite</span>
    </button>
    
    <button class="nav-btn" id="uploadBtn">
        <i class="fa-solid fa-plus"></i>
        <span>Upload</span>
    </button>

    <button class="nav-btn" onclick="location.href='profile.html'">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
    </button>

    <button class="nav-btn" onclick="location.href='setting.html'">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
    </button>

</aside>


<!-- MAIN AREA -->

<div class="main-area">
    <!-- TOPBAR -->

<header class="topbar">
<h2>Notifications</h2>
</header>


<!-- NOTIFICATION LIST -->

<div class="notification-page">

<!-- THIS WEEK -->

<h3 class="section-title">This Week</h3>

<div class="notification-item unread">
<img src="https://i.pravatar.cc/40?img=1" alt="">
<div>
<strong>John</strong> liked your post
<p class="time">2h ago</p>
</div>
</div>

<div class="notification-item unread">
<img src="https://i.pravatar.cc/40?img=2" alt="">
<div>
<strong>Alice</strong> started following you
<p class="time">5h ago</p>
</div>
</div>

<!-- EARLIER -->

<h3 class="section-title">Earlier</h3>

<div class="notification-item">
<img src="https://i.pravatar.cc/40?img=3" alt="">
<div>
<strong>Mike</strong> commented on your post
<p class="time">1d ago</p>
</div>
</div>

<div class="notification-item">
<img src="https://i.pravatar.cc/40?img=4" alt="">
<div>
<strong>Emma</strong> liked your reel
<p class="time">2d ago</p>
</div>
</div>

</div>

    

</div>


<script src="app.js" defer></script>
</body>
</html>
